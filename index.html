<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>بوصلة القبلة الملكية</title>

<style>
:root{
    --green:#013220;
    --gold:#d4af37;
    --gold-light:#f4d06f;
    --red:#c41e3a;
}

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0a0a0a;
    font-family:"Tajawal",sans-serif;
    color:#fff;
}

/* إطار الهاتف */
.phone{
    width:340px;
    height:680px;
    padding:14px;
    background:linear-gradient(145deg,var(--gold),#5a3a00);
    border-radius:40px;
    box-shadow:0 20px 50px #000;
}

/* الشاشة */
.screen{
    width:100%;
    height:100%;
    background:radial-gradient(circle,#024b30 0%,var(--green) 100%);
    border-radius:30px;
    position:relative;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* زخارف الخلفية */
.screen::after{
    content:"";
    position:absolute;
    inset:0;
    background:radial-gradient(circle at top, rgba(212,175,55,0.12), transparent 60%);
    opacity:.5;
    pointer-events:none;
}

/* العنوان */
header{
    margin-top:30px;
    text-align:center;
    z-index:2;
}
.title{
    font-size:1.7rem;
    color:var(--gold-light);
    text-shadow:0 2px 4px rgba(0,0,0,.5);
}

/* منطقة البوصلة */
.center-area{
    flex-grow:1;
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
    z-index:2;
}

/* الإطار المزخرف */
.ring{
    width:280px;
    height:280px;
    border-radius:50%;
    border:6px solid var(--gold);
    box-shadow:0 0 25px rgba(212,175,55,0.6), inset 0 0 20px rgba(0,0,0,0.7);
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:
        radial-gradient(circle at center, rgba(244,208,111,0.25), transparent 60%),
        repeating-radial-gradient(circle, transparent 0 6px, rgba(255,255,255,0.08) 7px 8px);
}

/* قرص البوصلة */
.disk{
    width:240px;
    height:240px;
    border-radius:50%;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:
        radial-gradient(circle at center, #013220 0, #00150c 60%),
        conic-gradient(from 0deg, rgba(255,255,255,0.15) 0 90deg, transparent 90deg 180deg, rgba(255,255,255,0.15) 180deg 270deg, transparent 270deg 360deg);
    border:2px solid rgba(255,255,255,0.2);
    transition:transform .1s linear;
}

/* علامات الشمال والجنوب */
.disk::before{
    content:"ش";
    position:absolute;
    top:6px;
    left:50%;
    transform:translateX(-50%);
    color:var(--gold-light);
    font-size:.9rem;
}
.disk::after{
    content:"ج";
    position:absolute;
    bottom:6px;
    left:50%;
    transform:translateX(-50%);
    color:var(--gold-light);
    font-size:.9rem;
}

/* الكعبة في المنتصف */
.kaaba{
    width:70px;
    height:70px;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    border-radius:50%;
    background:
        linear-gradient(to bottom,#000,#222);
    box-shadow:0 0 10px rgba(0,0,0,0.8);
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--gold-light);
    font-size:.7rem;
}
.kaaba::before{
    content:"الكعبة";
}

/* سهم القبلة */
.arrow{
    position:absolute;
    width:40px;
    height:40px;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:linear-gradient(to top,var(--red),var(--gold-light));
    clip-path:polygon(50% 0%,0% 100%,50% 80%,100% 100%);
    filter:drop-shadow(0 0 5px gold);
    z-index:3;
}

/* أسفل الشاشة */
.footer{
    width:100%;
    background:rgba(0,0,0,.4);
    padding:15px 0 20px;
    text-align:center;
    border-top:1px solid rgba(212,175,55,.2);
    z-index:2;
}
.degree{
    font-size:2rem;
    color:var(--gold-light);
    font-weight:700;
}

button{
    margin-top:8px;
    padding:10px 25px;
    background:transparent;
    border:1px solid var(--gold);
    color:var(--gold-light);
    border-radius:20px;
    cursor:pointer;
    transition:.3s;
}
button:hover{
    background:var(--gold);
    color:#000;
}
</style>
</head>

<body>

<div class="phone">
  <div class="screen">

    <header>
      <h1 class="title">اتجاه القبلة</h1>
      <p id="status" style="font-size:.8rem;color:#ccc">اضغط على الزر لتفعيل البوصلة</p>
    </header>

    <div class="center-area">
      <div class="ring"></div>
      <div id="disk" class="disk"></div>
      <div class="kaaba"></div>
      <div id="arrow" class="arrow"></div>
    </div>

    <div class="footer">
      <div class="degree" id="deg">0°</div>
      <button id="btn">تفعيل الحساسات</button>
    </div>

  </div>
</div>

<script>
let qiblaAngle = 0;
const kaaba = {lat:21.4225, lng:39.8262};

const statusEl = document.getElementById("status");
const diskEl   = document.getElementById("disk");
const arrowEl  = document.getElementById("arrow");
const degEl    = document.getElementById("deg");
const btn      = document.getElementById("btn");

btn.addEventListener("click", init);

function init(){
    if(!navigator.geolocation){
        statusEl.innerText = "المتصفح لا يدعم تحديد الموقع";
        return;
    }

    navigator.geolocation.getCurrentPosition(pos=>{
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;

        const y = Math.sin((kaaba.lng - lng) * Math.PI/180);
        const x = Math.cos(lat*Math.PI/180) * Math.tan(kaaba.lat*Math.PI/180)
                - Math.sin(lat*Math.PI/180) * Math.cos((kaaba.lng - lng)*Math.PI/180);

        qiblaAngle = (Math.atan2(y,x) * 180/Math.PI + 360) % 360;
        degEl.innerText = Math.round(qiblaAngle) + "°";
        statusEl.innerText = "تم تحديد اتجاه القبلة، انتظر تفعيل الحساسات";

        // iOS: طلب صلاحية الحساسات بعد تفاعل المستخدم
        if (window.DeviceOrientationEvent && typeof DeviceOrientationEvent.requestPermission === "function") {
            DeviceOrientationEvent.requestPermission()
            .then(res=>{
                if(res === "granted"){
                    statusEl.innerText = "الحساسات مفعّلة";
                    window.addEventListener("deviceorientation", updateCompass);
                }else{
                    statusEl.innerText = "تم رفض صلاحية الحساسات";
                }
            })
            .catch(()=>{
                statusEl.innerText = "خطأ في طلب صلاحية الحساسات";
            });
        } else {
            // متصفحات أخرى
            window.addEventListener("deviceorientation", updateCompass);
            statusEl.innerText = "الحساسات مفعّلة";
        }
    }, err=>{
        statusEl.innerText = "تعذر تحديد الموقع";
        console.log(err);
    });
}

function updateCompass(e){
    // في iOS نستخدم webkitCompassHeading إن وجد
    let heading = null;

    if (typeof e.webkitCompassHeading === "number") {
        heading = e.webkitCompassHeading; // 0 = الشمال الحقيقي
    } else if (typeof e.alpha === "number") {
        // احتياط: alpha (لكنها ليست دقيقة كاتجاه حقيقي)
        heading = 360 - e.alpha;
    }

    if (heading == null || isNaN(heading)) return;

    // تدوير القرص عكس اتجاه الجهاز
    diskEl.style.transform = `translate(-50%,-50%) rotate(${-heading}deg)`;

    // سهم القبلة = فرق القبلة عن اتجاه الجهاز
    const arrowRotation = qiblaAngle - heading;
    arrowEl.style.transform = `translate(-50%,-50%) rotate(${arrowRotation}deg)`;
}
</script>

</body>
</html>
