<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوصلة القبلة الذكية</title>
    <style>
        :root {
            --primary: #d4af37;
            --bg: #0f1215;
            --panel: #1a1f24;
        }
        body {
            margin: 0; background: var(--bg); color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden;
        }
        .app-container {
            width: 100%; max-width: 400px; text-align: center; padding: 20px;
        }
        .compass-wrapper {
            position: relative; width: 300px; height: 300px; margin: 40px auto;
            background: var(--panel); border-radius: 50%;
            border: 8px solid #252a30; box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        /* درجات البوصلة الثابتة */
        .compass-marks {
            position: absolute; inset: 0; border-radius: 50%;
            background: repeating-conic-gradient(from 0deg, #555 0deg 1deg, transparent 1deg 30deg);
        }
        .cardinal {
            position: absolute; font-weight: bold; color: var(--primary); font-size: 1.2rem;
        }
        .n { top: 10px; left: 50%; transform: translateX(-50%); color: #ff4d4d; }
        .s { bottom: 10px; left: 50%; transform: translateX(-50%); }
        .e { right: 10px; top: 50%; transform: translateY(-50%); }
        .w { left: 10px; top: 50%; transform: translateY(-50%); }

        /* إبرة القبلة */
        .qibla-needle {
            position: absolute; top: 50%; left: 50%;
            width: 12px; height: 140px;
            background: linear-gradient(to bottom, var(--primary) 50%, #444 50%);
            margin-top: -70px; margin-left: -6px;
            clip-path: polygon(50% 0%, 100% 20%, 100% 100%, 0% 100%, 0% 20%);
            transition: transform 0.2s cubic-bezier(0.1, 0.5, 0.1, 1);
            z-index: 10;
        }
        .kaaba-icon {
            position: absolute; top: -35px; left: 50%; transform: translateX(-50%);
            font-size: 24px;
        }
        .status-card {
            background: var(--panel); padding: 20px; border-radius: 15px;
            margin-top: 20px; border-bottom: 4px solid var(--primary);
        }
        button {
            background: var(--primary); border: none; padding: 12px 30px;
            border-radius: 25px; color: #000; font-weight: bold;
            font-size: 1rem; cursor: pointer; transition: 0.3s;
        }
        button:active { transform: scale(0.95); }
        .degree-display { font-size: 2rem; font-weight: bold; margin: 10px 0; color: var(--primary); }
    </style>
</head>
<body>

<div class="app-container">
    <h2 style="color: var(--primary);">اتجاه القبلة</h2>
    
    <div class="compass-wrapper">
        <div class="compass-marks"></div>
        <div class="cardinal n">N</div>
        <div class="cardinal s">S</div>
        <div class="cardinal e">E</div>
        <div class="cardinal w">W</div>
        
        <div id="qiblaNeedle" class="qibla-needle">
            <div class="kaaba-icon">🕋</div>
        </div>
    </div>

    <div class="status-card">
        <div id="degree" class="degree-display">0°</div>
        <p id="instruction" style="color: #888; font-size: 0.9rem;">اضغط لتفعيل البوصلة</p>
        <button id="startBtn">بدء التحديد</button>
    </div>
</div>

<script>
    const kaaba = { lat: 21.4225, lng: 39.8262 };
    let userQiblaAngle = 0;
    const needle = document.getElementById('qiblaNeedle');
    const degreeTxt = document.getElementById('degree');
    const startBtn = document.getElementById('startBtn');
    const instruction = document.getElementById('instruction');

    // 1. حساب الزاوية الجغرافية للقبلة
    function calculateQibla(lat, lng) {
        const PI = Math.PI;
        const lat1 = lat * PI / 180;
        const lat2 = kaaba.lat * PI / 180;
        const lonDiff = (kaaba.lng - lng) * PI / 180;

        const y = Math.sin(lonDiff);
        const x = Math.cos(lat1) * Math.tan(lat2) - Math.sin(lat1) * Math.cos(lonDiff);
        return (Math.atan2(y, x) * 180 / PI + 360) % 360;
    }

    async function init() {
        // طلب الموقع
        navigator.geolocation.getCurrentPosition(pos => {
            userQiblaAngle = calculateQibla(pos.coords.latitude, pos.coords.longitude);
            degreeTxt.innerText = Math.round(userQiblaAngle) + "°";
            
            // طلب إذن الحساسات (Safari iOS)
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(state => {
                        if (state === 'granted') startCompass();
                    });
            } else {
                startCompass();
            }
        }, () => {
            alert("يرجى تفعيل خدمة الموقع (GPS) أولاً");
        });
    }

    function startCompass() {
        startBtn.style.display = 'none';
        instruction.innerText = "وجه رأس الهاتف باتجاه الكعبة";

        window.addEventListener('deviceorientation', e => {
            let heading = 0;
            
            if (e.webkitCompassHeading) {
                // Safari (iOS) - أدق قيمة للشمال الحقيقي
                heading = e.webkitCompassHeading;
            } else {
                // Android
                heading = 360 - e.alpha;
            }

            // الفرق بين اتجاه الهاتف الحالي وزاوية القبلة
            const finalRotation = (userQiblaAngle - heading);
            needle.style.transform = `rotate(${finalRotation}deg)`;
            
            // إهتزاز بسيط أو تغيير لون عند الاقتراب من القبلة
            if (Math.abs(finalRotation % 360) < 5) {
                degreeTxt.style.color = "#49ff18";
            } else {
                degreeTxt.style.color = "var(--primary)";
            }
        }, true);
    }

    startBtn.addEventListener('click', init);
</script>

</body>
</html>
